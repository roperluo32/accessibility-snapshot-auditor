<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Accessible Product Page</title>
  </head>
  <body style="background: #ffffff; color: #1f2933;">
    <header>
      <nav aria-label="Primary">
        <a href="/features">Features</a>
      </nav>
    </header>
    <main>
      <h1>Accessible Product Page</h1>
      <section>
        <h2>Checkout form</h2>
        <img src="/hero.png" alt="Dashboard showing accessibility score">
        <form aria-label="Signup">
          <label for="email">Email</label>
          <input id="email" type="email">
          <button type="submit">Join waitlist</button>
        </form>
      </section>
    </main>
  </body>
</html>
